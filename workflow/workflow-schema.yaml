---
# The JSONSchema for 'Workflow' YAML files.
#
# See https://json-schema.org/understanding-json-schema/index.html

$schema: http://json-schema.org/draft-07/schema#

title: Data Manager Workflow Schema
description: >-
  The Schema for Data Manager Workflows

# The root-level object -------------------------------------------------------

type: object
properties:
  kind:
    const: DataManagerWorkflow
  kind-version:
    enum:
    - '2024.1'
  name:
    $ref: '#/definitions/rfc1035-label-name'
  description:
    type: string
    description: A description of the workflow
  steps:
    type: array
    items:
      $ref: "#/definitions/step"
required:
- kind
- kind-version
- name
- steps

# Sub-object definitions ------------------------------------------------------

definitions:

  # RFC 1035 Label Names (as used in Kubernetes)
  # See https://kubernetes.io/docs/concepts/overview/working-with-objects/names/
  rfc1035-label-name:
    type: string
    pattern: ^[a-z][a-z0-9-]{,63}(?<!-)$

  step:
    type: object
    additionalProperties: false
    properties:
      name:
        $ref: '#/definitions/rfc1035-label-name'
      description:
        type: string
        description: A description of the step
      specification:
        type: string
        description: The Data Manager Job Specification, a JSON string
      inputs:
        type: array
        description: Input parameters
        items:
          type: object
          properties:
            input:
              type: string
            from:
              type: object
              properties:
                step:
                  type: string
                output:
                  type: string
              required: [step, output]
          required: [input]
          anyOf:
          - properties:
              from:
                type: object
                required: [step, output]
          - properties:
              from:
                type: "null"
      outputs:
        type: array
        description: Output parameters
        items:
          type: object
          properties:
            input:
              type: string
            as:
              type: string
    required:
    - name
    - specification
    - inputs
    - outputs
